<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tributary - Sign In</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-deep: #030712;
      --bg-surface: #0f172a;
      --bg-elevated: #1e293b;
      --text-primary: #f8fafc;
      --text-secondary: rgba(248, 250, 252, 0.7);
      --text-muted: rgba(248, 250, 252, 0.4);
      --border: rgba(255, 255, 255, 0.08);
      --glass: rgba(255, 255, 255, 0.03);
      --accent: #06b6d4;
      --accent-glow: rgba(6, 182, 212, 0.3);
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg-deep);
      font-family: 'Inter', -apple-system, sans-serif;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Animated background */
    .bg-streams {
      position: fixed;
      inset: 0;
      overflow: hidden;
      opacity: 0.3;
    }

    .stream-line {
      position: absolute;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: stream-flow 8s linear infinite;
    }

    @keyframes stream-flow {
      0% { transform: translateX(-100%); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateX(100vw); opacity: 0; }
    }

    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .login-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--accent), #0ea5e9);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 8px 32px var(--accent-glow);
    }

    .logo-text {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .login-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .login-subtitle {
      font-size: 15px;
      color: var(--text-muted);
      margin-bottom: 40px;
      line-height: 1.5;
    }

    .login-btn {
      width: 100%;
      padding: 16px 24px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      color: var(--text-primary);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.2s ease;
      margin-bottom: 16px;
    }

    .login-btn:hover {
      background: var(--glass);
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .login-btn svg {
      width: 20px;
      height: 20px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
      color: var(--text-muted);
      font-size: 13px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .demo-btn {
      width: 100%;
      padding: 14px 24px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent), #0ea5e9);
      color: white;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .demo-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px var(--accent-glow);
    }

    .login-footer {
      margin-top: 32px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .login-footer a {
      color: var(--accent);
      text-decoration: none;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }

    /* Features preview */
    .features {
      margin-top: 48px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      text-align: center;
    }

    .feature {
      padding: 16px;
    }

    .feature-icon {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .feature-text {
      font-size: 12px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <!-- Animated background streams -->
  <div class="bg-streams" id="bgStreams"></div>

  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <div class="logo-icon">🌊</div>
        <span class="logo-text">Tributary</span>
      </div>
      
      <h1 class="login-title">Welcome back</h1>
      <p class="login-subtitle">Sign in to access your streams and stay organized with Trinity's help</p>
      
      <a href="/auth/google" class="login-btn">
        <svg viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </a>
      
      <div class="divider">or</div>
      
      <button class="demo-btn" onclick="location.href='/'">
        Try Demo Mode
      </button>
      
      <p class="login-footer">
        By continuing, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>
      </p>
    </div>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">🔗</div>
        <div class="feature-text">Connect all your apps</div>
      </div>
      <div class="feature">
        <div class="feature-icon">⚡</div>
        <div class="feature-text">AI-powered insights</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🌊</div>
        <div class="feature-text">Unified life streams</div>
      </div>
    </div>
  </div>

  <script>
    // Create animated background streams
    const container = document.getElementById('bgStreams');
    const colors = ['#3b82f6', '#10b981', '#ef4444', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4'];
    
    for (let i = 0; i < 20; i++) {
      const line = document.createElement('div');
      line.className = 'stream-line';
      line.style.top = `${Math.random() * 100}%`;
      line.style.width = `${100 + Math.random() * 300}px`;
      line.style.background = `linear-gradient(90deg, transparent, ${colors[Math.floor(Math.random() * colors.length)]}, transparent)`;
      line.style.animationDelay = `${Math.random() * 8}s`;
      line.style.animationDuration = `${6 + Math.random() * 6}s`;
      container.appendChild(line);
    }
  </script>
</body>
</html>
